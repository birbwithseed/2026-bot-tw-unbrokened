name: Update Language Breakdown

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-breakdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run breakdown script
        run: python3 utilities/update_breakdown.py --output file_breakdown.md

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add file_breakdown.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update language breakdown" && git push)
